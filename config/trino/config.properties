coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080

# Metabase's built-in driver still speaks the legacy Presto client protocol
# (X-Presto-* headers); accept those as an alias for X-Trino-* so it can connect.
protocol.v1.alternate-header-name=Presto

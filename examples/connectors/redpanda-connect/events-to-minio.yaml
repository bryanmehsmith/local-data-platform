input:
  kafka_franz:
    seed_brokers: ["redpanda:9092"]
    topics: ["raw.events"]
    consumer_group: "events-to-minio"

pipeline:
  processors:
    - mapping: |
        root = this
        root.ingested_at = now()

output:
  aws_s3:
    bucket: raw
    path: 'events/dt=${! now().ts_format("2006-01-02") }/hour=${! now().ts_format("15") }/${! uuid_v4() }.json.gz'
    endpoint: http://minio:9000
    force_path_style_urls: true
    region: us-east-1
    credentials:
      id: "${MINIO_APP_ACCESS_KEY}"
      secret: "${MINIO_APP_SECRET_KEY}"
    batching:
      count: 100
      period: 30s
      processors:
        - archive:
            format: lines
        - compress:
            algorithm: gzip

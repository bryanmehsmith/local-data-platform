name: local-data-platform

networks:
  ldp-net:
    external: true
    name: ldp-net

services:
  dbt-docs:
    image: nginx:1.27-alpine
    container_name: dbt-docs
    volumes:
      - ../processing/dbt_project/target:/usr/share/nginx/html:ro
    ports:
      - "8070:80"
    networks:
      - ldp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/index.html"]
      interval: 5s
      timeout: 5s
      retries: 12
